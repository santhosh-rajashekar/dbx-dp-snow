# ============================================================
# SNOW Data Product — Databricks Asset Bundle
# Domain: IT Service Management | Catalog: snow_product
# ============================================================
# Catalog and schemas are created by the setup notebook (00_Snow_Setup)
# rather than by bundle resources, to avoid needing CREATE CATALOG
# permissions on the service principal at the metastore level.
# ============================================================

bundle:
  name: dbx-dp-snow
  engine: direct

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405614225278648.8.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-7405614225278648.8.azuredatabricks.net
    permissions:
      - user_name: skarotirajashekar@godevsuite060.onmicrosoft.com
        level: CAN_MANAGE
